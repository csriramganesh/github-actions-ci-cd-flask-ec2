name: Deploy to EC2

on:
  workflow_dispatch:

env:
  IMAGE_NAME: flask-github-actions-cicd
  CONTAINER_NAME: flask-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy Container on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            docker pull ${{ secrets.DOCKER_USER }}/flask-github-actions-cicd:latest
            docker stop flask-app || true
            docker rm flask-app || true
            docker run -d --name flask-app -p 5000:5000 ${{ secrets.DOCKER_USER }}/flask-github-actions-cicd:latest
            docker ps
          EOF
